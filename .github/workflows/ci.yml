name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  nix-setup:
    name: Build Nix dev shell (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-v3-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-v3-${{ runner.os }}-
          gc-max-store-size-linux: 4294967296

      - name: Build Linux CI dev shells
        run: |
          nix develop .#x86_64-unknown-linux-musl --command true
          nix develop .#aarch64-unknown-linux-musl --command true

  rust-linux:
    name: Rust ${{ matrix.name }}
    needs: nix-setup
    uses: ./.github/workflows/build.yml
    with:
      target: ${{ matrix.target }}
      os: ubuntu-latest
      test: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            target: x86_64-unknown-linux-musl
          - name: Linux aarch64
            target: aarch64-unknown-linux-musl

  rust-macos:
    name: Rust ${{ matrix.name }}
    uses: ./.github/workflows/build.yml
    with:
      target: ${{ matrix.target }}
      os: macos-latest
      test: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x86_64
            target: x86_64-apple-darwin
          - name: macOS aarch64
            target: aarch64-apple-darwin

  rust-extra:
    name: Build ${{ matrix.name }}
    needs: nix-setup
    uses: ./.github/workflows/build.yml
    with:
      target: ${{ matrix.target }}
      os: ubuntu-latest
      test: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux i686
            target: i686-unknown-linux-musl
          - name: Linux armv7 (Allwinner A20/H3)
            target: armv7-unknown-linux-musleabihf
          - name: Linux armv5te (AST2500)
            target: armv5te-unknown-linux-musleabi
          - name: Linux arm/ARMv6 (Raspberry Pi 1)
            target: arm-unknown-linux-musleabihf

  format:
    name: Rust Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  elisp:
    name: Emacs Lisp
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs_version: ['30.1']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            emacs -Q --batch \
              --eval "(require 'package)" \
              --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
              --eval "(package-initialize)" \
              --eval "(package-refresh-contents)" \
              --eval "(setq package-install-upgrade-built-in t)" \
              --eval "(package-install 'tramp)" \
              --eval "(package-install 'msgpack)" && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Byte-compile
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(setq byte-compile-error-on-warn t)" \
            --eval "(push \"$(pwd)/lisp\" load-path)" \
            -f batch-byte-compile lisp/*.el

      - name: Check package metadata
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(with-current-buffer (find-file-noselect \"lisp/tramp-rpc.el\") (package-buffer-info))"

  test-autoload:
    name: Autoload Tests
    runs-on: ubuntu-latest
    needs: elisp

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '30.1'

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            emacs -Q --batch \
              --eval "(require 'package)" \
              --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
              --eval "(package-initialize)" \
              --eval "(package-refresh-contents)" \
              --eval "(setq package-install-upgrade-built-in t)" \
              --eval "(package-install 'tramp)" \
              --eval "(package-install 'msgpack)" && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Run autoload tests
        run: ./test/run-autoload-tests.sh

  test-protocol:
    name: Protocol Tests
    runs-on: ubuntu-latest
    needs: elisp

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '30.1'

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            emacs -Q --batch \
              --eval "(require 'package)" \
              --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
              --eval "(package-initialize)" \
              --eval "(package-refresh-contents)" \
              --eval "(setq package-install-upgrade-built-in t)" \
              --eval "(package-install 'tramp)" \
              --eval "(package-install 'msgpack)" && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Run protocol tests
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(setq debug-on-error t)" \
            -l test/tramp-rpc-mock-tests.el \
            --eval "(ert-run-tests-batch-and-exit \"^tramp-rpc-mock-test-protocol\")"

  test-multi-hop:
    name: Multi-Hop Tests
    runs-on: ubuntu-latest
    needs: elisp

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '30.1'

      - name: Clone upstream tramp
        run: |
          git clone --depth 1 https://github.com/emacsmirror/tramp.git ~/src/tramp
          echo "Tramp commit: $(git -C ~/src/tramp rev-parse HEAD)"

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            emacs -Q --batch \
              --eval "(require 'package)" \
              --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
              --eval "(package-initialize)" \
              --eval "(package-refresh-contents)" \
              --eval "(setq package-install-upgrade-built-in t)" \
              --eval "(package-install 'tramp)" \
              --eval "(package-install 'msgpack)" && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Run multi-hop tests
        run: |
          emacs -Q --batch \
            -L lisp \
            -L ~/src/tramp/lisp \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(setq debug-on-error t)" \
            -l test/tramp-rpc-mock-tests.el \
            --eval "(ert-run-tests-batch-and-exit '(tag :multi-hop))"

  test-server:
    name: Server Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-linux, elisp]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '30.1'

      - name: Download server binary
        uses: actions/download-artifact@v8
        with:
          name: tramp-rpc-server-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release/

      - name: Make server executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/tramp-rpc-server

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            emacs -Q --batch \
              --eval "(require 'package)" \
              --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
              --eval "(package-initialize)" \
              --eval "(package-refresh-contents)" \
              --eval "(setq package-install-upgrade-built-in t)" \
              --eval "(package-install 'tramp)" \
              --eval "(package-install 'msgpack)" && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Run server integration tests
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(setq debug-on-error t)" \
            -l test/tramp-rpc-mock-tests.el \
            --eval "(ert-run-tests-batch-and-exit '(tag :server))"

  test-full-suite:
    name: Full Test Suite (with SSH)
    runs-on: ubuntu-latest
    needs: [rust-linux, elisp]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '30.1'

      - name: Download server binary
        uses: actions/download-artifact@v8
        with:
          name: tramp-rpc-server-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release/

      - name: Make server executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/tramp-rpc-server

      - name: Setup SSH for localhost
        run: |
          # Generate SSH key
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""
          # Add to authorized_keys
          cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          # Configure SSH
          echo "Host localhost" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          # Increase MaxSessions for parallel async process tests
          echo "MaxSessions 50" | sudo tee -a /etc/ssh/sshd_config
          # Start SSH server
          sudo service ssh restart || sudo service ssh start || true
          # Test SSH connection
          ssh localhost "echo 'SSH connection successful'"

      - name: Deploy server to localhost
        run: |
          # Extract version from elisp source (single source of truth)
          VERSION=$(grep -oP 'tramp-rpc-deploy-version "\K[^"]+' lisp/tramp-rpc-deploy.el)
          echo "Deploying version: $VERSION"
          mkdir -p ~/.cache/emacs/tramp-rpc
          cp target/x86_64-unknown-linux-musl/release/tramp-rpc-server ~/.cache/emacs/tramp-rpc/tramp-rpc-server-${VERSION}

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            emacs -Q --batch \
              --eval "(require 'package)" \
              --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
              --eval "(package-initialize)" \
              --eval "(package-refresh-contents)" \
              --eval "(setq package-install-upgrade-built-in t)" \
              --eval "(package-install 'tramp)" \
              --eval "(package-install 'msgpack)" && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Run full test suite
        env:
          TRAMP_RPC_TEST_HOST: localhost
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(setq debug-on-error t)" \
            --eval "(setq tramp-verbose 0)" \
            -l test/tramp-rpc-tests.el \
            --eval "(ert-run-tests-batch-and-exit \"^tramp-rpc-test\")"

  test-upstream-tramp:
    name: Upstream Tramp Tests
    runs-on: ubuntu-latest
    needs: [rust-linux, elisp]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '30.1'

      - name: Clone upstream tramp
        run: |
          git clone --depth 1 https://github.com/emacsmirror/tramp.git ~/src/tramp
          echo "Tramp commit: $(git -C ~/src/tramp rev-parse HEAD)"
          # Generate trampver.el from the autoconf template.  The git
          # repo only ships trampver.el.in; without a generated
          # trampver.el Emacs falls back to its bundled copy whose
          # version string is too old for tramp-rpc.
          VERSION=$(grep -oP 'AC_INIT\(\[Tramp\],\s*\[\K[^\]]+' ~/src/tramp/configure.ac)
          echo "Upstream Tramp version: $VERSION"
          sed -e "s/@PACKAGE_VERSION@/$VERSION/g" \
              -e "s/@PACKAGE_BUGREPORT@/tramp-devel@gnu.org/g" \
              -e "s/@EMACS_REQUIRED_VERSION@/28.1/g" \
              -e 's|@PACKAGE_URL@|https://www.gnu.org/software/tramp/|g' \
              -e 's/@TRAMP_EMACS_VERSION_CHECK@/"ok"/g' \
              -e 's/@configure_input@/Generated from trampver.el.in for CI/g' \
              ~/src/tramp/lisp/trampver.el.in > ~/src/tramp/lisp/trampver.el

      - name: Download server binary
        uses: actions/download-artifact@v8
        with:
          name: tramp-rpc-server-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release/

      - name: Make server executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/tramp-rpc-server

      - name: Setup SSH for localhost
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""
          cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          echo "Host localhost" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          # Increase MaxSessions for parallel async process tests
          # (test45 opens 10+ concurrent multiplexed SSH sessions)
          echo "MaxSessions 50" | sudo tee -a /etc/ssh/sshd_config
          sudo service ssh restart || sudo service ssh start || true
          ssh localhost "echo 'SSH connection successful'"

      - name: Deploy server to localhost
        run: |
          VERSION=$(grep -oP 'tramp-rpc-deploy-version "\K[^"]+' lisp/tramp-rpc-deploy.el)
          echo "Deploying version: $VERSION"
          mkdir -p ~/.cache/emacs/tramp-rpc
          cp target/x86_64-unknown-linux-musl/release/tramp-rpc-server ~/.cache/emacs/tramp-rpc/tramp-rpc-server-${VERSION}

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            emacs -Q --batch \
              --eval "(require 'package)" \
              --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
              --eval "(package-initialize)" \
              --eval "(package-refresh-contents)" \
              --eval "(package-install 'msgpack)" && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Run upstream tramp tests
        env:
          TRAMP_RPC_TEST_HOST: localhost
          TRAMP_TEST_SOURCE: ~/src/tramp
        run: |
          # Exclude known unfixable tests:
          #   :unstable: not recommended by upstream Tramp
          #   tramp-test45-asynchronous-requests: upstream stress test is
          #     timing-sensitive with tramp-rpc's RPC process relay in CI.
          emacs -Q --batch \
            -L lisp \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            -l test/run-tramp-tests.el \
            --eval "(ert-run-tests-batch-and-exit '(and (not (tag :unstable)) (not tramp-test45-asynchronous-requests)))"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [rust-linux, rust-macos, rust-extra, elisp, test-autoload, test-protocol, test-multi-hop, test-server, test-full-suite, test-upstream-tramp]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "=== CI Summary ==="
          echo "Rust Linux: ${{ needs.rust-linux.result }}"
          echo "Rust macOS: ${{ needs.rust-macos.result }}"
          echo "Rust Extra: ${{ needs.rust-extra.result }}"
          echo "Elisp: ${{ needs.elisp.result }}"
          echo "Autoload Tests: ${{ needs.test-autoload.result }}"
          echo "Protocol Tests: ${{ needs.test-protocol.result }}"
          echo "Multi-Hop Tests: ${{ needs.test-multi-hop.result }}"
          echo "Server Tests: ${{ needs.test-server.result }}"
          echo "Full Test Suite: ${{ needs.test-full-suite.result }}"
          echo "Upstream Tramp Tests: ${{ needs.test-upstream-tramp.result }}"

          if [[ "${{ needs.rust-linux.result }}" != "success" ]] || \
             [[ "${{ needs.rust-macos.result }}" != "success" ]] || \
             [[ "${{ needs.rust-extra.result }}" != "success" ]] || \
             [[ "${{ needs.elisp.result }}" != "success" ]] || \
             [[ "${{ needs.test-autoload.result }}" != "success" ]] || \
             [[ "${{ needs.test-protocol.result }}" != "success" ]] || \
             [[ "${{ needs.test-multi-hop.result }}" != "success" ]] || \
             [[ "${{ needs.test-server.result }}" != "success" ]] || \
             [[ "${{ needs.test-full-suite.result }}" != "success" ]] || \
             [[ "${{ needs.test-upstream-tramp.result }}" != "success" ]]; then
            echo "Some tests failed!"
            exit 1
          fi
          echo "All tests passed!"
